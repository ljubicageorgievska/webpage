name: Build and publish website

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install pyyaml requests beautifulsoup4 pdfplumber

      - name: Process the inbox (new PDFs / SSRN links)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/process_inbox.py

      - name: Compile CV (LaTeX to PDF)
        run: |
          if [ -f cv/cv.tex ]; then
            curl -sL https://github.com/tectonic-typesetting/tectonic/releases/download/tectonic%400.15.0/tectonic-0.15.0-x86_64-unknown-linux-musl.tar.gz | tar -xz
            ./tectonic --outdir files cv/cv.tex
          fi

      - name: Commit any automatic updates back to the repository
        run: |
          git config user.name "website-robot"
          git config user.email "actions@github.com"
          git add papers.yml papers/ _inbox/ files/ index.qmd
          if ! git diff --cached --quiet; then
            git commit -m "Automatic update: new paper processed from inbox"
            git push
          fi

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render website
        run: quarto render

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
