- number: 3
  title: 'Time-varying Market Segmentation: The Twin D''s and a Tale of Two Tails'
  coauthors:
  - Sven Klingler
  - Lukas Kremens
  new: false
  note: 'This paper subsumes the previous paper "Currency Crashes and Sovereign
    Defaults: Two Markets and One Tail Risk".

    '
  presentations: 'AFA Annual Meeting, EEA Annual Meeting, Bank of England: 8th International
    Conference on Sovereign Bond Markets, Anderson School of Management Brownbag
    Seminar, and SDU

    '
  abstract: 'This paper documents striking market segmentation between sovereign
    credit default swaps (CDS) and far out-of-the-money (FOM) foreign exchange (FX)
    options markets. Despite pricing exposure to the same fundamental tail risks,
    sovereign default and currency crash, the "Twin Ds", these markets exhibit persistent
    pricing discrepancies that cannot be explained by differences in contract specifications
    or risk exposures. We propose that this segmentation reflects institutional
    separation between market participants: credit specialists and FX traders operate
    in distinct spheres with limited information sharing during normal times. Using
    two cross-market trading strategies, one exploiting USD-denominated CDS versus
    FOM FX options spreads, and another using quanto CDS versus FOM FX options,
    we show that these pricing discrepancies yield substantial abnormal returns
    with Sharpe ratios exceeding 7.2. Crucially, both strategies generate consistent
    results despite differing in their treatment of depreciation size upon default,
    confirming that our findings reflect genuine market segmentation rather than
    risk compensation for variable depreciation magnitude. The abnormal returns
    collapse to zero during sovereign crises, when information sharing intensifies
    and pricing converges across previously segmented markets. Our analysis further
    reveals that information flows unidirectionally from CDS to FX options markets,
    supporting our institutional explanation. We exploit regulatory changes and
    cross-country variation in market structure to strengthen identification and
    rule out alternative explanations based on rational risk pricing. These findings
    have implications for understanding market structure effects on tail risk pricing
    and for detecting potentially destabilizing market fragmentation.

    '
  draft_url: ''
  appendix_url: https://drive.google.com/file/d/1X799xln-jsWHaFPFG2fbZhaaTX9lXqTd/view?usp=sharing
- number: 2
  title: Collateral-adjusted CIP Arbitrages
  coauthors: []
  new: false
  presentations: 'EEA Annual Meeting, AFA Annual Meeting (Poster), Auckland Center''s
    Derivative Markets Conference, International Risk Management Conference, Virtual
    Derivatives Workshop, and Anderson School of Management Brownbag Seminar

    '
  abstract: 'I show that a no-arbitrage consistent but costly collateral rental
    yield explains about two-thirds of the apparent standard Covered Interest Rate
    (CIP) violations. I proxy this yield with the difference between the risk-free
    and overnight index swap rates between the cross bilateral currencies and apply
    it to both short and long-term CIP violations. Further, the results suggest
    an important direct collateral channel through which costly collateralization
    explains CIP violations, independent of previously documented global risks and
    intermediary frictions.

    '
  draft_url: https://papers.ssrn.com/sol3/papers.cfm?abstract_id=3629178
  appendix_url: https://drive.google.com/file/d/1k_BJd_-ydye6V_om4X6A2jrhbP-YWfB2/view?usp=sharing
  extra_links:
