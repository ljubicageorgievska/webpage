- number: 1
  title: Constraints of Collateralization and Regulation and the Law of One Price
  coauthors: []
  new: false
  awards: '[Macro Financial Modeling Project Fellowship Award](https://bfi.uchicago.edu/project/mfm-macro-financial-modeling-project/)
    from the Becker Friedman Institute at the University of Chicago

    '
  abstract_label: Summary
  abstract: 'I research collateralisation and bank regulatory changes in the post-2008
    crisis period and their ability to explain large and persistent deviations from
    the law of one price observed in a number of arbitrage opportunities measured
    by cash-derivative bases across asset classes. The study attributes the inability
    to narrow these arbitrage opportunities to costs of participation which arise
    due to intermediaries facing collateral, leverage and liquidity constraints,
    resulting in limits-to-arbitrage. These constraints inhibit regulated dealers/investors''
    ability to arbitrage bases across various asset classes and over time. Moreover,
    I go a step further and measure the magnitude of the effects of each binding
    constraint on the deviations from law of one price across time and in the cross
    section across several asset classes. This allows me to classify asset classes
    by the magnitude of impact received from the binding constraints. The asset
    class bases I look at are: Bonds-CDS, Treasuries-Interest Rate Swaps, Covered
    interest rate parity, Inflation rate swaps-TIPS, and Stock Index - Stock index
    swaps bases.

    '
