working_papers:
- number: 7
  title: 'The US Treasury''s Biggest Short: Duration in the Shadows'
  coauthors:
  - Stefano Pegoraro
  - Anthony Saunders
  new: true
  presentations: 2025 Colorado Finance Summit, 2025 ESADE Spring Workshop, 2026
    Midwest Finance Association, 2026 Young Scholars Finance Consortium at Texas
    A&M, 2026 Consortium on Asset Management, 2026 International Conference on Sovereign
    Bond Markets, 2026 LAPE-FINEST Spring Workshop, University of Notre Dame, BI
    Norwegian Business School, BIS-World Bank-Banxico Tenth Public Investors Conference
    *(upcoming)*, EUROFIDAI-ESSEC Paris December Finance Meeting *(upcoming)*, and
    7th Annual RCF-ECGI Conference *(upcoming)*.
  abstract: With U.S. government debt exceeding $36 trillion, the management of
    interest rate risk on the Treasury's fixed-rate liabilities has become a first-order
    fiscal question. We show that the Treasury, while institutionally sophisticated
    in channeling borrowing surprises into Treasury bills to preserve stable fixed-rate
    issuance, does not extend this capacity to managing the duration risk embedded
    in its fixed-rate debt portfolio. The Treasury absorbs fiscal shocks through
    bills while maintaining predictable longer-term issuance, and does not adjust
    duration supply in response to market signals, instead tilting toward maturities
    with the highest intermediation margins. The 2024–2025 buyback program targeted
    below-par bonds, freeing $21 billion in nominal fiscal capacity with no market-value
    gain for taxpayers. Exploiting staggered ESA 2010 adoption, we find core European
    countries reduced term spreads by 0.28 to 0.37 percentage points by managing
    duration risk.
  draft_url: https://papers.ssrn.com/sol3/papers.cfm?abstract_id=5041078
- number: 6
  title: Model-Free Cross-Country Convenience Term Premia and the U.S. Dollar Reserve
    Currency Status
  coauthors: []
  new: false
  presentations: ''
  abstract: 'We develop a parametric-model-free triangular no-arbitrage methodology
    that recovers cross-country convenience term premia, differentials in bilateral
    term premia at the long end of the term structure, for seven currencies from
    cross-currency basis swaps. First, U.S. Treasuries no longer command a long-horizon
    convenience term premium against major reserve sovereigns: the ten-year term
    premium of Bunds over Treasuries averaged +31 basis points pre-GFC, -39 during
    the GFC, and -67 post-GFC; for JGBs, +37, -25, and -81. Second, inelastic U.S.
    fiscal duration drives U.S. convenience term premia through a preferred-habitat
    channel. Third, the cross-sectional average predicts the equally-weighted dollar
    basket twelve months ahead orthogonally to interest rate differentials.

    '
  draft_url: https://papers.ssrn.com/sol3/papers.cfm?abstract_id=5737482
- number: 5
  title: 'The "Hairy Premium": Incomplete Markets and Frictions'
  coauthors:
  - Anthony Saunders
  new: false
  presentations: '2024 Annual Meetings of the American Finance Association (AFA),
    2024 European Finance Association (EFA), 2024 Northern Finance Association Annual
    Conference (NFA), Midwest Finance Association Conference (MFA), Young Scholars
    Nordic Finance Network Workshop (NFN), Alpine Finance Summit, Finance and Accounting
    Annual Research Symposium, Financial Engineering and Banking Society, BI Workshop
    on Uncertainty, NYU Stern School of Business, Miami Herbert Business School,
    Frankfurt School of Finance and Management, and BI Norwegian Business School

    '
  abstract: 'Interest rate swaps should theoretically generate zero expected excess
    returns under risk-neutral pricing, yet systematically deviate from this principle.
    Fixed-rate receivers earn 2.74% annual excess returns ("Hairy premiums") in
    U.S. dollar 10-year swaps, with similar magnitudes across G10 currencies. Applying
    novel triangular extraction methodology from cross-currency swaps, we decompose
    realized U.S. relative premiums into expected and unexpected components. Expected
    premiums explain 67.1-77.1% of realized variance and significantly differ from
    zero, demonstrating markets expect these deviations ex-ante. We attribute expected
    premiums to market incompleteness: absent long-term government floating-rate
    notes and binding shorting constraints prevent static replication, forcing costly
    dynamic hedging. Forecast errors reveal systematic monetary policy misinterpretation.'
  draft_url: https://papers.ssrn.com/sol3/papers.cfm?abstract_id=4475821
